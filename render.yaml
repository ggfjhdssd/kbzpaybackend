services:
  - type: web
    name: kbzpaybackend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── Fill these in Render dashboard ──
      - key: MONGODB_URI
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: MIN_WITHDRAW
        value: "100000"
      - key: SERVICE_FEE
        value: "5000"
      - key: REFERRAL_BONUS
        value: "5000"
      - key: PAYMENT_PHONE
        value: "09702310926"
      - key: PAYMENT_NAME
        value: "Daw Mi Thaung"
